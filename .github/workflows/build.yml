name: Build Purple PvP Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # GitHub Actions serverining o'ziga Gradle 8.11.1 o'rnatamiz
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      # Hech qanday ./gradlew faylisiz, to'g'ridan-to'g'ri tizim orqali build qilamiz
      - name: Build Mod with Gradle
        run: |
          if [ -f gradle.properties ]; then
            gradle build
          elif [ -f myvisual/gradle.properties ]; then
            cd myvisual && gradle build
          else
            gradle build
          fi

      # Tayyor bo'lgan Purple PvP Mod (.jar) faylini yuklab olishga tayyorlash
      - name: Upload Built Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Purple-PvP-Mod
          path: "**/build/libs/*.jar"
