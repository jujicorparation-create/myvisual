name: Build Fabric Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodlarni yuklab olish (Checkout)
      uses: actions/checkout@v4

    - name: Java 21 muhitini sozlash
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Gradle ishga tushirish huquqini berish
      run: chmod +x gradlew

    - name: Modni build qilish (Yig'ish)
      run: ./gradlew build

    - name: Tayyor .JAR faylini saqlash (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Purple-PvP-Mod
        path: build/libs/*.jar

